<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>TikTok Live Studio Overlay</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    .overlay {
      --primary: #8f00ff;
      --secondary: #00b7ff;
      --accent: #ff2d75;

      --box-bg-start: rgba(8, 8, 18, 0.88);
      --box-bg-end: rgba(45, 0, 95, 0.78);

      --top-bg-start: rgba(20, 20, 35, 0.85);
      --top-bg-end: rgba(90, 0, 160, 0.72);

      --border: rgba(180, 90, 255, 0.95);
      --text: #ffffff;
      --sub-text: rgba(255, 255, 255, 0.9);

      --glow-primary: rgba(160, 70, 255, 0.8);
      --glow-secondary: rgba(0, 180, 255, 0.45);

      position: relative;
      width: 1920px;
      height: 1080px;
      background: transparent;
      color: var(--text);
    }

    .top-title {
      position: absolute;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);

      padding: 18px 46px;
      border-radius: 999px;

      font-size: 42px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;

      background: linear-gradient(
        135deg,
        var(--top-bg-start),
        var(--top-bg-end)
      );

      border: 2px solid var(--border);

      box-shadow:
        0 0 20px var(--glow-primary),
        0 0 55px var(--glow-secondary);

      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.45),
        0 0 24px var(--primary);
    }

    .live-pill {
      position: absolute;
      left: 55px;
      top: 35px;

      padding: 14px 26px;
      border-radius: 999px;

      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;

      background: rgba(10, 10, 20, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.16);

      box-shadow: 0 0 30px var(--accent);
    }

    .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent);
      animation: pulse 1.2s infinite;
    }

    .left-counter-box {
      position: absolute;
      left: 55px;
      top: 50%;
      transform: translateY(-50%);

      width: 430px;
      min-height: 230px;

      padding: 28px 32px;
      border-radius: 32px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;

      background: linear-gradient(
        145deg,
        var(--box-bg-start),
        var(--box-bg-end)
      );

      border: 2px solid var(--border);

      box-shadow:
        0 0 22px var(--glow-primary),
        0 0 75px var(--glow-secondary);

      animation: floatBox 4s ease-in-out infinite;
    }

    .counter-label {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      color: var(--sub-text);
      text-shadow: 0 0 14px var(--secondary);
    }

    .counter {
      font-size: 76px;
      font-weight: 950;
      letter-spacing: 2px;
      line-height: 1;

      padding: 18px 28px;
      border-radius: 24px;

      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.14);

      color: var(--text);

      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.75),
        0 0 30px var(--secondary),
        0 0 55px var(--primary);
    }

    .bottom-info {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);

      padding: 16px 36px;
      border-radius: 999px;

      font-size: 30px;
      font-weight: 800;
      letter-spacing: 1px;
      white-space: nowrap;

      background: rgba(10, 10, 20, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.14);

      box-shadow:
        0 0 22px var(--glow-primary),
        0 0 55px var(--glow-secondary);

      color: var(--text);
      text-shadow: 0 0 16px var(--secondary);
    }

    @keyframes floatBox {
      0%, 100% {
        transform: translateY(-50%) translateX(0);
      }

      50% {
        transform: translateY(calc(-50% - 10px)) translateX(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.45);
        opacity: 0.55;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay">
    <div class="live-pill">
      <span class="dot"></span>LIVE
    </div>

    <div class="top-title" id="topText">
      TOP TEXT
    </div>

    <div class="left-counter-box" id="counterBox"></div>

    <div class="bottom-info" id="bottomText">
      Folge dem Stream und sei bei der nächsten Runde dabei
    </div>
  </div>

  <script>
    /*
      =====================================
      OVERLAY CONFIG
      Hier kannst du alles anpassen
      =====================================
    */

    const OVERLAY_CONFIG = {
      countdownSeconds: 600,

      topText: "NXT LUCKY PALACE",
      bottomText: "Folge dem Stream und sei bei der nächsten Runde dabei",

      counterText: "Nächste Runde startet in",

      // "above" = Text über dem Counter
      // "below" = Text unter dem Counter
      counterTextPosition: "above",

      endText: "STARTET JETZT",

      // true = Countdown startet nach Ablauf neu
      // false = Countdown bleibt bei 00:00 stehen
      loop: false,

      colors: {
        primary: "#8f00ff",
        secondary: "#00b7ff",
        accent: "#ff2d75",

        boxBackgroundStart: "rgba(8, 8, 18, 0.88)",
        boxBackgroundEnd: "rgba(45, 0, 95, 0.78)",

        topBackgroundStart: "rgba(20, 20, 35, 0.85)",
        topBackgroundEnd: "rgba(90, 0, 160, 0.72)",

        border: "rgba(180, 90, 255, 0.95)",
        text: "#ffffff",
        subText: "rgba(255, 255, 255, 0.9)",

        glowPrimary: "rgba(160, 70, 255, 0.8)",
        glowSecondary: "rgba(0, 180, 255, 0.45)"
      }
    };

    /*
      =====================================
      SCRIPT
      Ab hier musst du nichts ändern
      =====================================
    */

    const config = OVERLAY_CONFIG;

    const overlay = document.getElementById("overlay");
    const topTextElement = document.getElementById("topText");
    const bottomTextElement = document.getElementById("bottomText");
    const counterBox = document.getElementById("counterBox");

    let startSeconds = Number(config.countdownSeconds) || 300;
    let remainingSeconds = startSeconds;

    function applyColors(colors) {
      if (!colors) return;

      overlay.style.setProperty("--primary", colors.primary);
      overlay.style.setProperty("--secondary", colors.secondary);
      overlay.style.setProperty("--accent", colors.accent);

      overlay.style.setProperty("--box-bg-start", colors.boxBackgroundStart);
      overlay.style.setProperty("--box-bg-end", colors.boxBackgroundEnd);

      overlay.style.setProperty("--top-bg-start", colors.topBackgroundStart);
      overlay.style.setProperty("--top-bg-end", colors.topBackgroundEnd);

      overlay.style.setProperty("--border", colors.border);
      overlay.style.setProperty("--text", colors.text);
      overlay.style.setProperty("--sub-text", colors.subText);

      overlay.style.setProperty("--glow-primary", colors.glowPrimary);
      overlay.style.setProperty("--glow-secondary", colors.glowSecondary);
    }

    applyColors(config.colors);

    topTextElement.textContent = config.topText || "LIVE OVERLAY";
    bottomTextElement.textContent = config.bottomText || "";

    const labelElement = document.createElement("div");
    labelElement.className = "counter-label";
    labelElement.textContent = config.counterText || "Nächste Runde startet in";

    const counterElement = document.createElement("div");
    counterElement.className = "counter";

    function buildCounterLayout() {
      counterBox.innerHTML = "";

      if (config.counterTextPosition === "below") {
        counterBox.appendChild(counterElement);
        counterBox.appendChild(labelElement);
      } else {
        counterBox.appendChild(labelElement);
        counterBox.appendChild(counterElement);
      }
    }

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;

      if (hours > 0) {
        return (
          String(hours).padStart(2, "0") +
          ":" +
          String(minutes).padStart(2, "0") +
          ":" +
          String(secs).padStart(2, "0")
        );
      }

      return (
        String(minutes).padStart(2, "0") +
        ":" +
        String(secs).padStart(2, "0")
      );
    }

    function updateCounter() {
      counterElement.textContent = formatTime(remainingSeconds);
    }

    buildCounterLayout();
    updateCounter();

    setInterval(() => {
      if (remainingSeconds > 0) {
        remainingSeconds--;
        updateCounter();
        return;
      }

      counterElement.textContent = config.endText || "START";

      if (config.loop === true) {
        setTimeout(() => {
          remainingSeconds = startSeconds;
          updateCounter();
        }, 1500);
      }
    }, 1000);
  </script>
</body>
</html>
