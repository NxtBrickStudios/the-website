<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>TikTok Live Overlay</title>

  <script src="config.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    .overlay {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: transparent;
      color: #ffffff;
    }

    .top-title {
      position: absolute;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);

      padding: 18px 46px;
      border-radius: 999px;

      font-size: 42px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;

      background: linear-gradient(
        135deg,
        rgba(20, 20, 35, 0.85),
        rgba(90, 0, 160, 0.72)
      );

      border: 2px solid rgba(180, 90, 255, 0.9);

      box-shadow:
        0 0 20px rgba(160, 70, 255, 0.8),
        0 0 55px rgba(0, 180, 255, 0.35);

      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.45),
        0 0 24px rgba(174, 0, 255, 0.95);
    }

    .left-counter-box {
      position: absolute;
      left: 55px;
      top: 50%;
      transform: translateY(-50%);

      width: 430px;
      min-height: 230px;

      padding: 28px 32px;
      border-radius: 32px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;

      background: linear-gradient(
        145deg,
        rgba(8, 8, 18, 0.86),
        rgba(45, 0, 95, 0.78)
      );

      border: 2px solid rgba(170, 80, 255, 0.95);

      box-shadow:
        0 0 22px rgba(170, 80, 255, 0.85),
        0 0 75px rgba(0, 170, 255, 0.32);

      animation: floatBox 4s ease-in-out infinite;
    }

    .counter-label {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 14px rgba(0, 180, 255, 0.8);
    }

    .counter {
      font-size: 76px;
      font-weight: 950;
      letter-spacing: 2px;
      line-height: 1;

      padding: 18px 28px;
      border-radius: 24px;

      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.14);

      color: #ffffff;

      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.75),
        0 0 30px rgba(0, 217, 255, 0.95),
        0 0 55px rgba(174, 0, 255, 0.85);
    }

    .live-pill {
      position: absolute;
      left: 55px;
      top: 35px;

      padding: 14px 26px;
      border-radius: 999px;

      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;

      background: rgba(10, 10, 20, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.16);

      box-shadow: 0 0 30px rgba(255, 45, 117, 0.55);
    }

    .dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 12px;
      border-radius: 50%;
      background: #ff2d75;
      box-shadow: 0 0 18px #ff2d75;
      animation: pulse 1.2s infinite;
    }

    @keyframes floatBox {
      0%, 100% {
        transform: translateY(-50%) translateX(0);
      }

      50% {
        transform: translateY(calc(-50% - 10px)) translateX(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.45);
        opacity: 0.55;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="live-pill">
      <span class="dot"></span>LIVE
    </div>

    <div class="top-title" id="topText">
      TOP TEXT
    </div>

    <div class="left-counter-box" id="counterBox">
      <!-- Wird per JS befüllt -->
    </div>
  </div>

  <script>
    const config = OVERLAY_CONFIG;

    const topTextElement = document.getElementById("topText");
    const counterBox = document.getElementById("counterBox");

    let startSeconds = Number(config.countdownSeconds) || 300;
    let remainingSeconds = startSeconds;

    topTextElement.textContent = config.topText || "LIVE OVERLAY";

    const labelElement = document.createElement("div");
    labelElement.className = "counter-label";
    labelElement.textContent = config.counterText || "Nächste Runde startet in";

    const counterElement = document.createElement("div");
    counterElement.className = "counter";

    function buildCounterLayout() {
      counterBox.innerHTML = "";

      if (config.counterTextPosition === "below") {
        counterBox.appendChild(counterElement);
        counterBox.appendChild(labelElement);
      } else {
        counterBox.appendChild(labelElement);
        counterBox.appendChild(counterElement);
      }
    }

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      return `${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function updateCounter() {
      counterElement.textContent = formatTime(remainingSeconds);
    }

    buildCounterLayout();
    updateCounter();

    setInterval(() => {
      if (remainingSeconds > 0) {
        remainingSeconds--;
        updateCounter();
        return;
      }

      counterElement.textContent = config.endText || "START";

      if (config.loop === true) {
        setTimeout(() => {
          remainingSeconds = startSeconds;
          updateCounter();
        }, 1500);
      }
    }, 1000);
  </script>
</body>
</html>
