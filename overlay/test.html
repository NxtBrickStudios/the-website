<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0" />
  <title>TikTok Text Overlay</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      font-family: "Poppins", Arial, sans-serif;
      overflow: hidden;
      color: white;
    }

    .overlay {
      position: relative;
      width: 1080px;
      height: 1920px;
      background: transparent;
    }

    .text-box {
      position: absolute;
      left: 70px;
      bottom: 180px;
      width: 850px;
      padding: 28px 34px;
      border-radius: 28px;

      background: linear-gradient(
        135deg,
        rgba(20, 20, 35, 0.82),
        rgba(90, 0, 160, 0.65)
      );

      border: 2px solid rgba(190, 90, 255, 0.9);
      box-shadow:
        0 0 25px rgba(160, 60, 255, 0.8),
        0 0 70px rgba(90, 0, 255, 0.45);

      animation: floatBox 4s ease-in-out infinite;
    }

    .tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 18px;
      border-radius: 999px;

      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;

      color: #ffffff;
      background: linear-gradient(90deg, #8f00ff, #00b7ff);
      box-shadow: 0 0 18px rgba(0, 183, 255, 0.8);
    }

    .title {
      margin: 0;
      font-size: 64px;
      line-height: 1.05;
      font-weight: 900;
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.5),
        0 0 28px rgba(174, 0, 255, 0.9);
    }

    .subtitle {
      margin-top: 18px;
      font-size: 34px;
      line-height: 1.35;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
    }

    .highlight {
      color: #00d9ff;
      font-weight: 800;
      text-shadow: 0 0 16px rgba(0, 217, 255, 0.9);
    }

    .small-bar {
      position: absolute;
      left: 70px;
      top: 120px;
      padding: 18px 28px;
      border-radius: 999px;

      font-size: 30px;
      font-weight: 800;

      background: rgba(10, 10, 20, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.55);
    }

    .pulse-dot {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 12px;
      border-radius: 50%;
      background: #ff2d75;
      box-shadow: 0 0 18px #ff2d75;
      animation: pulse 1.3s infinite;
    }

    @keyframes floatBox {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.45);
        opacity: 0.65;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="overlay">
    <div class="small-bar">
      <span class="pulse-dot"></span>
      LIVE
    </div>

    <div class="text-box">
      <div class="tag">Nxt Lucky Palace</div>

      <h1 class="title">
        Willkommen im <span class="highlight">Live</span>
      </h1>

      <div class="subtitle">
        Schreib in den Chat, folge dem Stream und sei beim nächsten Game dabei.
      </div>
    </div>
  </div>
</body>
</html>
